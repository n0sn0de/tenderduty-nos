services:
  nosnode-seer:
    build:
      context: .
      args:
        VERSION: local
        COMMIT: local
        BUILD_DATE: reproducible-local
    image: nosnode-seer:local
    container_name: nosnode-seer
    restart: unless-stopped
    read_only: true
    user: "26657:26657"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:28686:28686"
    volumes:
      - ./config.yml:/etc/nosnode-seer/config.yml:ro
      - ./chains.d:/etc/nosnode-seer/chains.d:ro
      - seer-state:/var/lib/nosnode-seer
    command:
      - -f
      - /etc/nosnode-seer/config.yml
      - -cc
      - /etc/nosnode-seer/chains.d
      - -state
      - /var/lib/nosnode-seer/state.json

volumes:
  seer-state:
