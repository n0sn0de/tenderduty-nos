name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go 1.26.5 quality and security
    runs-on: ubuntu-24.04
    container:
      image: docker.io/library/golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651
    env:
      GOFLAGS: "-mod=readonly -buildvcs=false"
      GOTOOLCHAIN: local
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Toolchain and module integrity
        run: |
          go version
          go mod verify
          go mod tidy -diff

      - name: Formatting
        run: test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Unit tests
        run: go test -count=1 ./...

      - name: Race tests
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 -- ./...

      - name: Gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.28.0 -quiet ./...

      - name: Govulncheck reviewed baseline
        run: |
          report="$(mktemp)"
          go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 -format json ./... > "${report}"
          go run ./scripts/check-govulncheck.go -allow security/govulncheck-allowlist.txt "${report}"
          rm -f "${report}"

      - name: Deterministic binary build
        env:
          SOURCE_DATE_EPOCH: "0"
        run: |
          mkdir -p /tmp/seer-a /tmp/seer-b
          build() {
            go build -buildvcs=false -trimpath \
              -ldflags="-s -w -buildid= -X main.version=ci -X main.commit=${GITHUB_SHA} -X main.date=1970-01-01T00:00:00Z" \
              -o "$1/nosnode-seer" .
          }
          CGO_ENABLED=0 build /tmp/seer-a
          CGO_ENABLED=0 build /tmp/seer-b
          cmp /tmp/seer-a/nosnode-seer /tmp/seer-b/nosnode-seer
          sha256sum /tmp/seer-a/nosnode-seer
          /tmp/seer-a/nosnode-seer -version
