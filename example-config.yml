---
# NosNode Seer example configuration.
# Existing Tenderduty key names are intentionally preserved for compatibility.

enable_dashboard: true
listen_port: 8888
# Dashboard logs can reveal node names and errors. Keep hidden on any untrusted network.
hide_logs: true

node_down_alert_minutes: 3
node_down_alert_severity: critical

prometheus_enabled: true
prometheus_listen_port: 28686

pagerduty:
  enabled: false
  api_key: "replace-me"
  default_severity: alert

discord:
  enabled: false
  webhook: "https://example.invalid/discord-webhook"
  mentions: []

telegram:
  enabled: false
  api_key: "replace-me"
  channel: "replace-me"
  mentions: []

slack:
  enabled: false
  webhook: "https://example.invalid/slack-webhook"
  mentions: []

healthcheck:
  enabled: false
  ping_url: "https://example.invalid/healthcheck"
  ping_rate: 60

chains:
  "Example chain":
    chain_id: example-1
    valoper_address: examplevaloper1replacewithoperatoraddress
    # Set only when consensus-key discovery cannot be used.
    valcons_override: ""
    public_fallback: false

    alerts:
      stalled_enabled: true
      stalled_minutes: 10

      consecutive_enabled: true
      consecutive_missed: 5
      consecutive_priority: critical

      percentage_enabled: false
      percentage_missed: 10
      percentage_priority: warning

      alert_if_inactive: true
      alert_if_no_servers: true

      pagerduty:
        enabled: false
        api_key: ""

      discord:
        enabled: false
        webhook: ""
        mentions: []

      telegram:
        enabled: false
        api_key: ""
        channel: ""
        mentions: []

      slack:
        enabled: false
        webhook: ""
        mentions: []

    nodes:
      - url: "http://127.0.0.1:26657"
        alert_if_down: true
      - url: "https://rpc.example.invalid:443"
        alert_if_down: false
